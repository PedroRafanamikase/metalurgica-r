<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Produto | Metalúrgica R</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topo">
  <h1 class="logo">Metalúrgica <span>R</span></h1>
  <nav class="nav">
    <a href="index.html">Início</a>
    <a href="produtos.html">Produtos</a>
    <a href="contato.html">Contato</a>
  </nav>
</header>

<main class="container">

  <section class="produto-detalhe-horizontal">

    <!-- ESQUERDA -->
    <div class="produto-imagem">
      <img src="imagens/portao-garagem.jpg" alt="Portão">
    </div>

    <!-- DIREITA -->
    <div class="produto-info">
      <h2 id="nomeProduto"></h2>
      <p class="avaliacao">⭐⭐⭐⭐⭐ 4.9 (210 avaliações)</p>

      <p class="descricao">
        Portão fabricado sob medida, estrutura reforçada,
        pintura eletrostática e excelente durabilidade.
      </p>

      <button class="btn comprar" onclick="comprarWhats()">
        Contatar pelo WhatsApp
      </button>
    </div>

  </section>

</main>

<footer>
  © 2026 – Rafael Rubens
</footer>

<script>
const params = new URLSearchParams(window.location.search);
const nome = params.get("produto");
document.getElementById("nomeProduto").innerText = nome;

function comprarWhats() {
  window.location.href =
    "https://wa.me/5588982198585?text=Olá,%20tenho%20interesse%20no%20" + nome;
}
</script>

</body>
</html>
