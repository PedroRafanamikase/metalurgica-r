<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin - Metalúrgica R</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body { font-family: Arial, sans-serif; background:#f5f5f5; padding:20px;}
  h1 { text-align:center; color:#333; margin-bottom:20px;}
  .admin-container { max-width:800px; margin:0 auto; background:white; padding:20px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
  .admin-item { display:flex; justify-content: space-between; align-items:center; margin:10px 0; padding:10px; border-radius:6px; border:1px solid #ddd; background:#fafafa; transition:0.3s; }
  .admin-item.fora { background:#ffe6e6; border-color:#ff4c4c;}
  .admin-item button { padding:6px 12px; border:none; border-radius:5px; cursor:pointer; transition:0.3s;}
  .admin-item button.estoque { background:#4CAF50; color:white; }
  .admin-item button.fora { background:#FF4C4C; color:white; }
  #addProduto { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px;}
  #addProduto input { flex:1; padding:8px; border-radius:6px; border:1px solid #ccc;}
  #addProduto button { padding:10px 20px; border:none; border-radius:6px; background:#007bff; color:white; cursor:pointer; transition:0.3s;}
  #addProduto button:hover { background:#0056b3; }
</style>
</head>
<body>

<h1>Administrador de Estoque - Metalúrgica R</h1>
<div class="admin-container">

  <div id="addProduto">
    <input type="text" id="novoNome" placeholder="Nome do Produto">
    <input type="text" id="novaCategoria" placeholder="Categoria">
    <input type="text" id="novoPreco" placeholder="Preço (R$)">
    <button onclick="adicionarProduto()">Adicionar Produto</button>
  </div>

  <div id="admin-list"></div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
