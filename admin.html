<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin - Metalúrgica R</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .admin-container { max-width: 1100px; margin: 0 auto; }
    #addProduto { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: start; margin-bottom: 16px; }
    #addProduto .col { display: flex; flex-direction: column; gap: 8px; }
    #addProduto input, #addProduto textarea, #addProduto button, #addProduto select { padding: 8px; font-size: 14px; }
    #produtosTable { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { text-align: left; padding: 8px; border: 1px solid #ddd; vertical-align: middle; }
    th { background: #f5f5f5; }
    img.thumb { width: 80px; height: 60px; object-fit: cover; border-radius: 4px; }
    .actions button { margin-right: 6px; }
    .empty { color: #666; padding: 12px; }
    .image-preview { max-width: 160px; max-height: 120px; object-fit: contain; border: 1px dashed #ccc; padding: 4px; }
    @media (max-width: 720px) {
      #addProduto { grid-template-columns: 1fr; }
      img.thumb { width: 60px; height: 44px; }
    }
  </style>
</head>
<body>

  <h1>Administrador de Estoque - Metalúrgica R</h1>
  <div class="admin-container">

    <form id="addForm" aria-label="Adicionar produto">
      <div id="addProduto">
        <div class="col">
          <input type="text" id="novoNome" placeholder="Nome do Produto" required>
          <input type="text" id="novaCategoria" placeholder="Categoria" required>
          <input type="number" id="novoPreco" placeholder="Preço (R$)" step="0.01" min="0" required>
          <input type="number" id="novaQuantidade" placeholder="Quantidade" step="1" min="0" value="1" required>
        </div>

        <div class="col">
          <textarea id="novaDescricao" placeholder="Descrição (opcional)" rows="4"></textarea>

          <label>
            <input type="file" id="novaImagem" accept="image/*">
          </label>
          <div>
            <img id="previewImage" class="image-preview" alt="Preview da imagem" style="display:none">
          </div>

          <div style="display:flex; gap:8px;">
            <button type="submit">Adicionar Produto</button>
            <button type="button" id="limparBtn">Limpar</button>
            <button type="button" id="exportBtn">Exportar JSON</button>
          </div>
        </div>
      </div>
    </form>

    <div id="admin-list">
      <table id="produtosTable" aria-live="polite">
        <thead>
          <tr>
            <th>Imagem</th>
            <th>Nome</th>
            <th>Categoria</th>
            <th>Descrição</th>
            <th>Preço (R$)</th>
            <th>Qtd</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="produtosBody">
          <tr class="empty"><td colspan="7">Nenhum produto cadastrado.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // Chave de storage
    const STORAGE_KEY = 'mr_produtos_v2';

    function carregarProdutos() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function salvarProdutos(list) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    }

    function formatPreco(v) {
      return Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function escapeHtml(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderProdutos() {
      const tbody = document.getElementById('produtosBody');
      const produtos = carregarProdutos();
      tbody.innerHTML = '';

      if (!produtos.length) {
        const tr = document.createElement('tr');
        tr.className = 'empty';
        tr.innerHTML = '<td colspan="7">Nenhum produto cadastrado.</td>';
        tbody.appendChild(tr);
        return;
      }

      produtos.forEach((p, idx) => {
        const tr = document.createElement('tr');
        const imgCell = p.imagem ? `<img class="thumb" src="${p.imagem}" alt="${escapeHtml(p.nome)}">` : '';
        const desc = p.descricao ? escapeHtml(p.descricao) : '';
        tr.innerHTML = `
          <td>${imgCell}</td>
          <td>${escapeHtml(p.nome)}</td>
          <td>${escapeHtml(p.categoria)}</td>
          <td>${desc}</td>
          <td>R$ ${formatPreco(p.preco)}</td>
          <td>${Number(p.quantidade)}</td>
          <td class="actions">
            <button data-action="tirar" data-idx="${idx}">Tirar do estoque</button>
            <button data-action="editar" data-idx="${idx}">Editar</button>
            <button data-action="remover" data-idx="${idx}">Remover</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Leitura de imagem e preview
    document.getElementById('novaImagem').addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      const img = document.getElementById('previewImage');
      if (!file) { img.style.display = 'none'; img.src = ''; return; }
      // Limite sugerido: 2MB
      if (file.size > 2 * 1024 * 1024) { alert('Imagem muito grande (max 2MB).'); e.target.value = ''; img.style.display = 'none'; return; }
      const reader = new FileReader();
      reader.onload = function(ev) {
        img.src = ev.target.result;
        img.style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    // Adicionar produto
    document.getElementById('addForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const nome = document.getElementById('novoNome').value.trim();
      const categoria = document.getElementById('novaCategoria').value.trim();
      const preco = Number(document.getElementById('novoPreco').value);
      const quantidade = Number(document.getElementById('novaQuantidade').value);
      const descricao = document.getElementById('novaDescricao').value.trim();
      const fileInput = document.getElementById('novaImagem');

      if (!nome || !categoria || Number.isNaN(preco) || Number.isNaN(quantidade)) {
        alert('Preencha os campos obrigatórios corretamente.');
        return;
      }

      let imagemData = '';
      const file = fileInput.files && fileInput.files[0];
      if (file) {
        imagemData = await readFileAsDataURL(file);
      }

      const produtos = carregarProdutos();
      produtos.push({ id: Date.now(), nome, categoria, preco, quantidade, descricao, imagem: imagemData });
      salvarProdutos(produtos);
      renderProdutos();
      limparFormulario();
    });

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const fr = new FileReader();
        fr.onload = () => resolve(fr.result);
        fr.onerror = reject;
        fr.readAsDataURL(file);
      });
    }

    // Limpar form
    function limparFormulario() {
      document.getElementById('novoNome').value = '';
      document.getElementById('novaCategoria').value = '';
      document.getElementById('novoPreco').value = '';
      document.getElementById('novaQuantidade').value = '1';
      document.getElementById('novaDescricao').value = '';
      document.getElementById('novaImagem').value = '';
      const img = document.getElementById('previewImage'); img.style.display = 'none'; img.src = '';
    }

    document.getElementById('limparBtn').addEventListener('click', limparFormulario);

    // Exportar JSON (download)
    document.getElementById('exportBtn').addEventListener('click', () => {
      const data = carregarProdutos();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'produtos.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    // Delegação de eventos para ações na tabela
    document.getElementById('produtosTable').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      const idx = Number(btn.dataset.idx);
      const produtos = carregarProdutos();
      if (idx < 0 || idx >= produtos.length) return;

      if (action === 'remover') {
        if (!confirm('Remover este produto permanentemente?')) return;
        produtos.splice(idx, 1);
        salvarProdutos(produtos);
        renderProdutos();
      } else if (action === 'tirar') {
        if (produtos[idx].quantidade <= 0) { alert('Quantidade já está em 0.'); return; }
        produtos[idx].quantidade = Number(produtos[idx].quantidade) - 1;
        salvarProdutos(produtos);
        renderProdutos();
      } else if (action === 'editar') {
        const p = produtos[idx];
        // preencher formulário com dados existentes
        document.getElementById('novoNome').value = p.nome;
        document.getElementById('novaCategoria').value = p.categoria;
        document.getElementById('novoPreco').value = p.preco;
        document.getElementById('novaQuantidade').value = p.quantidade;
        document.getElementById('novaDescricao').value = p.descricao || '';
        if (p.imagem) {
          const img = document.getElementById('previewImage');
          img.src = p.imagem; img.style.display = 'block';
        }

        // remove item antigo e let admin submit to re-add as update
        produtos.splice(idx, 1);
        salvarProdutos(produtos);
        renderProdutos();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });

    // Inicializa
    renderProdutos();
  </script>

  <!-- Se você mantém um arquivo externo, ele ainda pode ser usado -->
  <script src="js/admin.js" defer></script>
</body>
</html>
