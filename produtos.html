<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Produtos - Metalúrgica R</title>
<link rel="stylesheet" href="css/style.css">
<style>
  /* pequenas melhorias de estilo locais */
  .produtos-container { display: grid; grid-template-columns: repeat(auto-fit,minmax(260px,1fr)); gap: 16px; padding: 12px; }
  .card { border: 1px solid #ddd; padding: 12px; border-radius: 6px; background: #fff; display:flex; gap:12px; align-items:flex-start; }
  .card.fora { opacity: 0.9; }
  .card img { width: 120px; height: 90px; object-fit: cover; border-radius:4px; }
  .info { flex:1; }
  .info h4 { margin:0 0 6px 0; }
  .botao-comprar { background: #2a9d8f; color: #fff; border: none; padding: 8px 12px; border-radius:4px; cursor:pointer; }
